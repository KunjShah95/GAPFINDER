<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GapMiner — Page Not Found</title>
    <meta name="theme-color" content="#050505">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #050505;
        color: rgba(255,255,255,0.85);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container { text-align: center; padding: 2rem; }
      .code {
        font-size: 6rem;
        font-weight: 700;
        background: linear-gradient(135deg, #8b5cf6, #10b981);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 1rem;
      }
      h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
      p { color: rgba(255,255,255,0.5); font-size: 0.875rem; margin-bottom: 2rem; line-height: 1.5; }
      a {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.5rem;
        border-radius: 9999px;
        background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        color: white;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 4px 20px rgba(139,92,246,0.3);
        transition: transform 0.2s, box-shadow 0.2s;
      }
      a:hover { transform: translateY(-2px); box-shadow: 0 0 0 1px rgba(255,255,255,0.15), 0 8px 30px rgba(139,92,246,0.4); }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <a href="/">← Back to Home</a>
    </div>
  </body>
</html>
